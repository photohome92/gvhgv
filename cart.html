<!DOCTYPE html>
<html>
<head>
<title>Cart</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="topbar">
<h1>Your Cart</h1>
</div>

<div id="cartBox"></div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let box = document.getElementById("cartBox");
let total = 0;

cart.forEach((c)=>{
total += c.price;

box.innerHTML += `
<div class="cart-item">
<span>${c.name}</span>
<span>Rs ${c.price}</span>
</div>
`;
});

box.innerHTML += `
<div class="total-box">Total: Rs ${total}</div>

<button style="width:100%;padding:15px;font-size:20px;background:#ffcc00;border:none;font-weight:900;"
onclick="order()">Checkout on WhatsApp</button>
`;

function order(){
let msg="Order:%0A";
cart.forEach((c,i)=>{
msg += `${i+1}. ${c.name} - Rs ${c.price}%0A`;
});
window.open("https://wa.me/923338181082?text="+msg);
}
</script>

</body>
</html>
